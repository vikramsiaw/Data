<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Free Download Hub | Script & Tools</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .download-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0,0,0,0.02);
            padding: 2rem 1.8rem;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .download-card:hover {
            transform: translateY(-3px);
        }

        .header-icon {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header-icon i {
            font-size: 3rem;
            color: #1f8ef1;
            background: #eef2ff;
            padding: 0.8rem;
            border-radius: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #0f2b3d, #1f8ef1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 0.5rem;
        }

        .select-group {
            margin-bottom: 1.8rem;
        }
        .select-group label {
            font-weight: 600;
            color: #1e293b;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .custom-select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            background-color: white;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2rem;
        }
        .custom-select:hover, .custom-select:focus {
            border-color: #1f8ef1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(31,142,241,0.1);
        }

        .link-area {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 0.2rem;
            margin-top: 1rem;
            min-height: 100px;
        }
        .link-card {
            background: #ffffff;
            border-radius: 1.2rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            border: 1px solid #e9eef3;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .link-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            flex: 2;
            min-width: 180px;
        }
        .link-info i {
            font-size: 1.3rem;
            color: #1f8ef1;
            background: #eef2ff;
            padding: 0.4rem;
            border-radius: 50%;
        }
        .link-url {
            font-size: 0.85rem;
            word-break: break-all;
            color: #1e293b;
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-weight: 500;
        }
        .link-url a {
            text-decoration: none;
            color: #1e6fdf;
            font-weight: 600;
        }
        .link-url a:hover {
            text-decoration: underline;
        }
        .copy-btn {
            background: #eef2ff;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e3a8a;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .copy-btn:hover {
            background: #d9e6ff;
            transform: scale(0.98);
        }
        .empty-state {
            text-align: center;
            padding: 1.8rem;
            color: #64748b;
            font-style: italic;
            background: #ffffffb3;
            border-radius: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .empty-state i {
            font-size: 2rem;
            color: #94a3b8;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 1.8rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
        @media (max-width: 550px) {
            .download-card {
                padding: 1.5rem;
            }
            .link-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .copy-btn {
                align-self: flex-end;
            }
            .link-info {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="download-card">
    <div class="header-icon">
        <i class="fas fa-cloud-download-alt"></i>
    </div>
    <h1>Free Download Hub</h1>
    <div style="text-align: center;">
        <span class="sub"><i class="fas fa-file-alt"></i> Pilih file, dapatkan link</span>
    </div>

    <div class="select-group">
        <label><i class="fas fa-list-ul"></i> Pilih file yang ingin di-download:</label>
        <select id="fileSelect" class="custom-select">
            <option value="" disabled selected>-- Klik untuk membuka daftar --</option>
        </select>
    </div>

    <div id="linkDisplayArea" class="link-area">
        <div class="empty-state">
            <i class="fas fa-mouse-pointer"></i>
            <span>Silakan pilih file dari dropdown di atas.</span>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-database"></i> Link langsung dari server premium — update berkala
    </div>
</div>

<script>
    // Daftar file (sudah termasuk DAMAGE MAX yang baru)
    const fileList = [
        { id: "drone2", name: "Drone View x2", link: "https://bicolink.com/rPCZ", icon: "fa-eye" },
        { id: "drone3", name: "Drone View X3", link: "https://bicolink.com/ew122gdaxM", icon: "fa-eye" },
        { id: "drone4", name: "Drone View x4", link: "https://bicolink.com/H5gX1juHJ5", icon: "fa-eye" },
        { id: "damage_txt", name: "Damage Txt + Drone View x3", link: "https://bicolink.com/N9x0", icon: "fa-skull" },
        { id: "damage_ranked", name: "Damage Bisa Main Ranked", link: "https://bicolink.com/K4E7Fwlz1", icon: "fa-skull" },
        { id: "damage_70", name: "DAMAGE 70% WORK ALL HERO + BYPASS + DRONE VIEW", link: "https://bicolink.com/CwWl839qHv", icon: "fa-bolt" },
        { id: "damage_max", name: "DAMAGE MAX WORK ALL HERO + BYPASS + DRONE VIEW", link: "https://bicolink.com/xXy0x298XL", icon: "fa-bolt" }
    ];

    // Elemen DOM
    const selectEl = document.getElementById('fileSelect');
    const displayArea = document.getElementById('linkDisplayArea');

    // Fungsi untuk menampilkan link yang dipilih
    function showSelectedFile(selectedId) {
        if (!selectedId) {
            // Tampilkan empty state
            displayArea.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-mouse-pointer"></i>
                    <span>Silakan pilih file dari dropdown di atas.</span>
                </div>
            `;
            return;
        }
        const file = fileList.find(f => f.id === selectedId);
        if (!file) return;

        // Buat tampilan link
        displayArea.innerHTML = `
            <div class="link-card">
                <div class="link-info">
                    <i class="fas ${file.icon}"></i>
                    <div class="link-url">
                        <a href="${file.link}" target="_blank">${file.link}</a>
                    </div>
                </div>
                <button class="copy-btn" data-link="${file.link}">
                    <i class="fas fa-copy"></i> Salin link
                </button>
            </div>
        `;

        // Tambahkan event listener untuk tombol copy
        const copyBtn = displayArea.querySelector('.copy-btn');
        if (copyBtn) {
            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const linkToCopy = copyBtn.getAttribute('data-link');
                copyToClipboard(linkToCopy, copyBtn);
            });
        }
    }

    // Fungsi copy ke clipboard dengan feedback
    async function copyToClipboard(text, buttonElement) {
        try {
            await navigator.clipboard.writeText(text);
            const originalHTML = buttonElement.innerHTML;
            buttonElement.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
            buttonElement.style.backgroundColor = "#c6e0ff";
            setTimeout(() => {
                buttonElement.innerHTML = originalHTML;
                buttonElement.style.backgroundColor = "";
            }, 1500);
        } catch (err) {
            // Fallback
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            const originalHTML = buttonElement.innerHTML;
            buttonElement.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
            setTimeout(() => {
                buttonElement.innerHTML = originalHTML;
            }, 1500);
        }
    }

    // Mengisi dropdown
    function populateDropdown() {
        fileList.forEach(file => {
            const option = document.createElement('option');
            option.value = file.id;
            option.textContent = file.name;
            selectEl.appendChild(option);
        });
        // Event listener saat pilihan berubah
        selectEl.addEventListener('change', (e) => {
            const selectedValue = e.target.value;
            showSelectedFile(selectedValue);
        });
    }

    populateDropdown();
</script>
</body>
</html>
