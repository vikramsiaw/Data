<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VIKRAM</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== BACKGROUND ANIMATION ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particles span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(120, 80, 255, 0.3);
            border-radius: 50%;
            animation: float-particle linear infinite;
        }
        .bg-particles span:nth-child(1) {
            left: 10%;
            animation-duration: 12s;
            animation-delay: 0s;
            width: 6px;
            height: 6px;
        }
        .bg-particles span:nth-child(2) {
            left: 25%;
            animation-duration: 16s;
            animation-delay: 2s;
        }
        .bg-particles span:nth-child(3) {
            left: 40%;
            animation-duration: 14s;
            animation-delay: 4s;
            width: 8px;
            height: 8px;
        }
        .bg-particles span:nth-child(4) {
            left: 55%;
            animation-duration: 18s;
            animation-delay: 1s;
        }
        .bg-particles span:nth-child(5) {
            left: 70%;
            animation-duration: 13s;
            animation-delay: 3s;
            width: 5px;
            height: 5px;
        }
        .bg-particles span:nth-child(6) {
            left: 85%;
            animation-duration: 15s;
            animation-delay: 5s;
        }
        .bg-particles span:nth-child(7) {
            left: 50%;
            animation-duration: 20s;
            animation-delay: 0.5s;
            width: 10px;
            height: 10px;
        }
        .bg-particles span:nth-child(8) {
            left: 15%;
            animation-duration: 17s;
            animation-delay: 2.5s;
            width: 7px;
            height: 7px;
        }
        .bg-particles span:nth-child(9) {
            left: 65%;
            animation-duration: 11s;
            animation-delay: 4.5s;
        }
        .bg-particles span:nth-child(10) {
            left: 90%;
            animation-duration: 19s;
            animation-delay: 1.5s;
            width: 9px;
            height: 9px;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== MAIN WRAPPER ===== */
        .app-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 50% 80%, rgba(80, 40, 200, 0.15) 0%, transparent 70%);
        }

        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(11, 10, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(120, 80, 255, 0.15);
        }

        /* ===== HAMBURGER BUTTON ===== */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border: none;
            background: transparent;
            z-index: 110;
            transition: transform 0.3s ease;
        }
        .hamburger:hover {
            transform: scale(1.05);
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            border-radius: 4px;
            background: #c8b8ff;
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .hamburger span:nth-child(1) {
            background: linear-gradient(90deg, #a78bfa, #8b5cf6);
        }
        .hamburger span:nth-child(2) {
            background: linear-gradient(90deg, #8b5cf6, #7c3aed);
        }
        .hamburger span:nth-child(3) {
            background: linear-gradient(90deg, #7c3aed, #6d28d9);
        }

        /* Hamburger open state (turns into X) */
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
            background: #f472b6;
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scale(0);
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
            background: #f472b6;
        }

        /* ===== VIKRAM TEXT WITH LIGHTNING EFFECT ===== */
        .brand {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            user-select: none;
            padding: 4px 8px;
        }

        .brand .lightning-text {
            background: linear-gradient(135deg, #f0e6ff, #c4b5fd, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
            animation: lightning-glow 1.8s ease-in-out infinite alternate;
            text-shadow:
                0 0 10px rgba(167, 139, 250, 0.5),
                0 0 20px rgba(124, 58, 237, 0.3),
                0 0 40px rgba(124, 58, 237, 0.15);
        }

        /* Lightning core glow */
        .brand .lightning-text::before {
            content: 'VIKRAM';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff, #c4b5fd, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(12px);
            opacity: 0.4;
            animation: lightning-before 1.8s ease-in-out infinite alternate;
            z-index: -1;
        }

        /* Spark particles around text */
        .brand .lightning-text::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 8%),
                radial-gradient(circle at 70% 10%, rgba(167, 139, 250, 0.5) 0%, transparent 10%),
                radial-gradient(circle at 90% 60%, rgba(124, 58, 237, 0.4) 0%, transparent 12%),
                radial-gradient(circle at 10% 80%, rgba(196, 181, 253, 0.4) 0%, transparent 10%);
            pointer-events: none;
            opacity: 0;
            animation: spark-burst 2.4s ease-in-out infinite;
            z-index: -1;
        }

        /* ===== LIGHTNING KEYFRAMES ===== */
        @keyframes lightning-glow {
            0% {
                text-shadow:
                    0 0 8px rgba(167, 139, 250, 0.4),
                    0 0 20px rgba(124, 58, 237, 0.2),
                    0 0 40px rgba(124, 58, 237, 0.1);
                filter: brightness(1);
            }
            25% {
                text-shadow:
                    0 0 15px rgba(255, 255, 255, 0.9),
                    0 0 30px rgba(167, 139, 250, 0.7),
                    0 0 60px rgba(124, 58, 237, 0.4),
                    0 0 90px rgba(124, 58, 237, 0.2);
                filter: brightness(1.3);
            }
            50% {
                text-shadow:
                    0 0 10px rgba(167, 139, 250, 0.5),
                    0 0 25px rgba(124, 58, 237, 0.3),
                    0 0 50px rgba(124, 58, 237, 0.15);
                filter: brightness(1);
            }
            75% {
                text-shadow:
                    0 0 20px rgba(255, 255, 255, 0.8),
                    0 0 40px rgba(167, 139, 250, 0.6),
                    0 0 70px rgba(124, 58, 237, 0.3),
                    0 0 100px rgba(124, 58, 237, 0.15);
                filter: brightness(1.4);
            }
            100% {
                text-shadow:
                    0 0 8px rgba(167, 139, 250, 0.4),
                    0 0 20px rgba(124, 58, 237, 0.2),
                    0 0 40px rgba(124, 58, 237, 0.1);
                filter: brightness(1);
            }
        }

        @keyframes lightning-before {
            0% {
                opacity: 0.3;
                filter: blur(10px);
            }
            30% {
                opacity: 0.7;
                filter: blur(15px);
            }
            60% {
                opacity: 0.3;
                filter: blur(10px);
            }
            85% {
                opacity: 0.8;
                filter: blur(18px);
            }
            100% {
                opacity: 0.3;
                filter: blur(10px);
            }
        }

        @keyframes spark-burst {
            0% {
                opacity: 0;
                transform: scale(0.8) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: scale(1.2) rotate(5deg);
            }
            30% {
                opacity: 0.8;
                transform: scale(1) rotate(-3deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.3) rotate(4deg);
            }
            70% {
                opacity: 0.6;
                transform: scale(1) rotate(-2deg);
            }
            85% {
                opacity: 1;
                transform: scale(1.1) rotate(2deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.9) rotate(0deg);
            }
        }

        /* ===== SUBTITLE ===== */
        .subtitle {
            color: rgba(196, 181, 253, 0.6);
            font-size: 12px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 300;
        }

        /* ===== CENTER CONTENT ===== */
        .hero {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
        }

        .hero .icon-big {
            font-size: 72px;
            margin-bottom: 16px;
            display: block;
            animation: float-icon 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(124, 58, 237, 0.3));
        }

        @keyframes float-icon {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .hero .tagline {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 300;
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .hero .tagline span {
            color: rgba(167, 139, 250, 0.7);
            font-weight: 600;
        }

        /* ===== DEVELOPER CREDIT ===== */
        .dev-credit {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(196, 181, 253, 0.25);
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 300;
            z-index: 1;
            pointer-events: none;
        }
        .dev-credit strong {
            color: rgba(167, 139, 250, 0.4);
            font-weight: 600;
        }

        /* ============================================
                   MENU OVERLAY (Sidebar)
                   ============================================ */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 360px;
            height: 100%;
            background: rgba(16, 14, 40, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 200;
            transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 80px 28px 40px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(120, 80, 255, 0.15);
            box-shadow: -20px 0 60px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        .menu-overlay.open {
            right: 0;
        }

        /* Close button inside menu */
        .menu-close {
            position: absolute;
            top: 18px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            transition: all 0.3s ease;
            line-height: 1;
        }
        .menu-close:hover {
            color: #f472b6;
            transform: rotate(90deg);
        }

        /* Menu items */
        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .menu-item:hover {
            background: rgba(120, 80, 255, 0.12);
            color: #ffffff;
            transform: translateX(4px);
        }

        .menu-item:active {
            transform: scale(0.96);
        }

        .menu-item .icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }

        .menu-item .label {
            flex: 1;
        }

        .menu-item .badge {
            font-size: 10px;
            background: rgba(244, 114, 182, 0.2);
            color: #f472b6;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .menu-item.download-item {
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.15), rgba(244, 114, 182, 0.08));
            border: 1px solid rgba(120, 80, 255, 0.2);
            margin-top: 8px;
        }

        .menu-item.download-item:hover {
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.25), rgba(244, 114, 182, 0.15));
            border-color: rgba(120, 80, 255, 0.4);
        }

        .menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 80, 255, 0.2), transparent);
            margin: 12px 8px;
        }

        .menu-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* ============================================
                   DOWNLOAD OVERLAY (Popup)
                   ============================================ */
        .download-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
            padding: 20px;
        }

        .download-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .download-card {
            background: linear-gradient(145deg, rgba(20, 18, 50, 0.98), rgba(11, 10, 26, 0.99));
            border-radius: 24px;
            padding: 36px 28px 32px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(120, 80, 255, 0.2);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(120, 80, 255, 0.05);
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        .download-overlay.open .download-card {
            transform: scale(1) translateY(0);
        }

        /* Glow border effect */
        .download-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.3), rgba(244, 114, 182, 0.2), rgba(120, 80, 255, 0.3));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.5;
            animation: border-glow 3s ease-in-out infinite alternate;
        }

        @keyframes border-glow {
            0% {
                opacity: 0.3;
            }
            100% {
                opacity: 0.7;
            }
        }

        .download-card .close-download {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 8px;
            line-height: 1;
        }
        .download-card .close-download:hover {
            color: #f472b6;
            transform: rotate(90deg);
        }

        .download-card .dl-icon {
            font-size: 48px;
            text-align: center;
            display: block;
            margin-bottom: 8px;
        }

        .download-card .dl-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .download-card .dl-title .highlight {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .download-card .dl-detail {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .download-card .dl-detail strong {
            color: rgba(244, 114, 182, 0.8);
            font-weight: 600;
        }

        .download-card .dl-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 80, 255, 0.2), transparent);
            margin: 0 0 24px 0;
        }

        .download-card .dl-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: inherit;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.3);
        }

        .download-card .dl-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.45);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .download-card .dl-link-btn:active {
            transform: scale(0.96);
        }

        .download-card .dl-link-btn .arrow {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .download-card .dl-link-btn:hover .arrow {
            transform: translateX(4px);
        }

        .download-card .dl-secure {
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* ===== BACKDROP OVERLAY (for menu) ===== */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
        }

        .backdrop.show {
            opacity: 1;
            visibility: visible;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .brand {
                font-size: 22px;
                letter-spacing: 2px;
            }
            .menu-overlay {
                width: 92%;
                padding: 72px 20px 30px;
            }
            .download-card {
                padding: 28px 20px 24px;
            }
            .download-card .dl-title {
                font-size: 19px;
            }
            .hero .icon-big {
                font-size: 56px;
            }
        }

        @media (max-width: 360px) {
            .brand {
                font-size: 18px;
                letter-spacing: 1px;
            }
            .menu-item {
                font-size: 14px;
                padding: 14px 14px;
            }
        }

        /* ===== SCROLLBAR STYLING ===== */
        .menu-overlay::-webkit-scrollbar {
            width: 3px;
        }
        .menu-overlay::-webkit-scrollbar-track {
            background: transparent;
        }
        .menu-overlay::-webkit-scrollbar-thumb {
            background: rgba(120, 80, 255, 0.3);
            border-radius: 10px;
        }

        /* Prevent body scroll when overlays are open */
        body.no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND PARTICLES ===== -->
    <div class="bg-particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- ===== BACKDROP ===== -->
    <div class="backdrop" id="backdrop"></div>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="brand">
            <span class="lightning-text">VIKRAM</span>
            <div class="subtitle">⚡ Dev by Syarief ⚡</div>
        </div>

        <div style="width:44px;"></div> <!-- spacer for centering -->
    </header>

    <!-- ===== HERO CONTENT ===== -->
    <div class="app-wrapper">
        <div class="hero">
            <span class="icon-big">⚡</span>
            <p class="tagline">
                Selamat datang di <span>VIKRAM</span> <br />
                Mod Menu by <span>Vikram Syarief</span>
            </p>
        </div>
    </div>

    <!-- ===== DEVELOPER CREDIT ===== -->
    <div class="dev-credit">
        <strong>VIKRAM</strong> &bull; Dev Vikram Syarief &bull; ⚡
    </div>

    <!-- ========================================
    MENU OVERLAY
    ======================================== -->
    <nav class="menu-overlay" id="menuOverlay" role="navigation" aria-label="Main menu">
        <button class="menu-close" id="menuCloseBtn" aria-label="Close menu">✕</button>

        <div class="menu-items">
            <!-- DOWNLOAD ITEM (yang diminta) -->
            <button class="menu-item download-item" id="downloadMenuBtn">
                <span class="icon">📥</span>
                <span class="label">Download</span>
                <span class="badge">NEW</span>
            </button>

<script>
    (function() {
        'use strict';

        // --- DOM refs ---
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuCloseBtn = document.getElementById('menuCloseBtn');
        const backdrop = document.getElementById('backdrop');
        const downloadMenuBtn = document.getElementById('downloadMenuBtn');
        const downloadOverlay = document.getElementById('downloadOverlay');
        const downloadCloseBtn = document.getElementById('downloadCloseBtn');
        const downloadLinkBtn = document.getElementById('downloadLinkBtn');

        // Menu items (for closing on click)
        const menuHomeBtn = document.getElementById('menuHomeBtn');
        const menuAboutBtn = document.getElementById('menuAboutBtn');
        const menuDevBtn = document.getElementById('menuDevBtn');

        const body = document.body;

        // --- Helper: toggle menu ---
        function openMenu() {
            menuOverlay.classList.add('open');
            backdrop.classList.add('show');
            hamburgerBtn.classList.add('active');
            body.classList.add('no-scroll');
        }

        function closeMenu() {
            menuOverlay.classList.remove('open');
            backdrop.classList.remove('show');
            hamburgerBtn.classList.remove('active');
            body.classList.remove('no-scroll');
        }

        function toggleMenu() {
            if (menuOverlay.classList.contains('open')) {
                closeMenu();
            } else {
                openMenu();
            }
        }

        // --- Helper: toggle download overlay ---
        function openDownload() {
            downloadOverlay.classList.add('open');
            body.classList.add('no-scroll');
            // Close menu if open
            if (menuOverlay.classList.contains('open')) {
                closeMenu();
            }
        }

        function closeDownload() {
            downloadOverlay.classList.remove('open');
            body.classList.remove('no-scroll');
        }

        // --- Event listeners ---

        // Hamburger
        hamburgerBtn.addEventListener('click', toggleMenu);

        // Menu close button
        menuCloseBtn.addEventListener('click', closeMenu);

        // Backdrop click -> close menu
        backdrop.addEventListener('click', closeMenu);

        // Download button in menu -> open download overlay
        downloadMenuBtn.addEventListener('click', openDownload);

        // Close download overlay
        downloadCloseBtn.addEventListener('click', closeDownload);

        // Click outside download card -> close (on backdrop)
        downloadOverlay.addEventListener('click', function(e) {
            if (e.target === downloadOverlay) {
                closeDownload();
            }
        });

        // Escape key: close any open overlay
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (downloadOverlay.classList.contains('open')) {
                    closeDownload();
                } else if (menuOverlay.classList.contains('open')) {
                    closeMenu();
                }
            }
        });

        // --- Menu item clicks (close menu + optional action) ---
        function handleMenuItemClose(action) {
            closeMenu();
            if (typeof action === 'function') {
                setTimeout(action, 350); // wait for menu close animation
            }
        }

        // Home
        menuHomeBtn.addEventListener('click', function() {
            handleMenuItemClose(function() {
                // scroll to top or just a small feedback
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        // About
        menuAboutBtn.addEventListener('click', function() {
            handleMenuItemClose(function() {
                alert('ℹ️ VIKRAM\nMod Menu by Vikram Syarief\nVersion 1.0\n\n Please Subscribe Follow Grup');
            });
        });

        // Developer
        menuDevBtn.addEventListener('click', function() {
            handleMenuItemClose(function() {
                alert('👨‍💻 Developer: Vikram Syarief\n\n📱 APK: VIKRAM\n Please Subscribe Follow Grup');
            });
        });

        // --- Download link button: track click (optional) ---
        downloadLinkBtn.addEventListener('click', function(e) {
            // Just let the link open naturally
            // Small haptic feedback simulation
            this.style.transform = 'scale(0.96)';
            setTimeout(() => { this.style.transform = ''; }, 150);
        });

        // --- Prevent zoom on double tap (mobile) ---
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // --- Small console greeting ---
        console.log('%c⚡ VIKRAM APK ⚡', 'font-size:20px; font-weight:bold; color:#a78bfa;');
        console.log('%cDev by Vikram Syarief', 'font-size:14px; color:#c4b5fd;');
        console.log('%cLightning Effect Active ⚡', 'font-size:12px; color:#f472b6;');

        // --- Fix for iOS Safari: ensure 100vh works ---
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);

        console.log('✅ VIKRAM APK siap digunakan!');
    })();
</script>
